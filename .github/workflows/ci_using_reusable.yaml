name: Integración continua usando workflow reusable

on :
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-node-build.yaml
    with:
      node-version: 18
      working-directory: hangman-api

test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js version
        uses: actions/setup-node@v6
        with:
          node-version: 18
      - name: Unit tests
        working-directory: hangman-api
        run: |
          npm ci
          npm run test
        
